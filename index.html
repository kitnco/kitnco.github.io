<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stride — Run Plan</title>
<style>
:root{
  --bg:#F7F6F3;
  --danger:#c0392b;
  --panel:#FFFFFF;
  --line:#E2DED7;
  --ink:#1C1C1A;
  --sub:#6B6E73;
  --accent:#1F8F5E;
  --accent-soft:#E3F0E8;
  --tile:#FFFFFF;
  --tile-border:#D8D4CC;
  --week-border:#C0BAB0;
  --week-bg:#F2F0EB;
  /* color buckets - light mode */
  --c-rest:#E8E7E5;
  --c-recovery:#E5E8F0;
  --c-easy:#E5F0E8;
  --c-lt:#FDFACC;
  --c-mp:#D8F0E3;
  --c-vo2:#EAD8F5;
  --c-race:#F5D8D8;
  --c-tuneup:#FDE8F0;
  --c-medlong-border:#1a8a8a;
}
body.dark{
  --bg:#15171A;
  --panel:#1E2126;
  --line:#2E333B;
  --ink:#F0F2F5;
  --sub:#8B919A;
  --accent:#5EE6A8;
  --accent-soft:#1A3028;
  --tile:#222629;
  --tile-border:#38404A;
  --week-border:#4A5260;
  --week-bg:#1A1D22;
  --c-rest:#27292C;
  --c-recovery:#1E2530;
  --c-easy:#1A2E22;
  --c-lt:#2E2A00;
  --c-mp:#0C1F14;
  --c-vo2:#2A1A3A;
  --c-race:#3A1515;
  --c-tuneup:#3A1525;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,'SF Pro Text',Helvetica,Arial,sans-serif;min-height:100vh;transition:background .2s,color .2s;}

/* ── TOP BAR ── */
.topbar{background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.topbar-r1{display:flex;align-items:center;gap:14px;padding:14px 24px 10px;flex-wrap:nowrap;}
.topbar-r2{display:flex;align-items:center;gap:14px;padding:8px 24px 12px;flex-wrap:wrap;border-top:1px solid var(--line);}

/* race name editable */
.race-title{
  font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--ink);
  border:none;background:transparent;outline:none;min-width:80px;max-width:280px;
  padding:2px 4px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.race-title:focus{background:var(--accent-soft);box-shadow:0 0 0 2px var(--accent);}
.race-title:empty::before{content:attr(data-placeholder);color:var(--sub);font-weight:600;}

/* nav */
.pagenav{display:flex;gap:3px;margin-left:auto;}
.pagenav a{font-size:12.5px;font-weight:700;text-decoration:none;color:var(--sub);padding:6px 11px;border-radius:8px;}
.pagenav a:hover{color:var(--ink);background:var(--accent-soft);}
.pagenav a.active{color:#fff;background:var(--accent);}
body.dark .pagenav a.active{color:#0B1410;}

/* sun/moon toggle */
.mode-btn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:8px;transition:background .15s;flex-shrink:0;display:flex;align-items:center;color:var(--ink);}
.mode-btn:hover{background:var(--accent-soft);}
/* ── SYNC / SETTINGS ── */
.icon-btn{position:relative;background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:8px;color:var(--ink);display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:var(--accent-soft);}
.sync-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--sub);border:1.5px solid var(--panel);pointer-events:none;}
.sync-dot.synced{background:#4CAF50;}
.sync-dot.pending,.sync-dot.syncing{background:var(--accent);animation:sdpulse 1.2s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes sdpulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-modal{width:340px;max-width:92vw;}
.sync-modal h3{font-size:16px;font-weight:800;margin-bottom:14px;}
.sync-modal label{display:block;font-size:10.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin:12px 0 5px;}
.sync-modal input[type=password]{width:100%;font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:2px;}
.sync-modal .hint{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.5;}
.sync-modal .hint a{color:var(--accent);}
.sync-modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.sync-connected{display:flex;flex-direction:column;gap:12px;}
.sync-status-row{display:flex;align-items:center;gap:10px;}
.sync-dot-lg{width:11px;height:11px;border-radius:50%;background:var(--sub);flex-shrink:0;}
.sync-dot-lg.synced{background:#4CAF50;}
.sync-dot-lg.syncing,.sync-dot-lg.pending{background:var(--accent);animation:sdpulse 1.2s infinite;}
.sync-dot-lg.error{background:var(--danger);}
.sync-status-txt{font-size:14px;font-weight:700;}
.sync-sub{font-size:12.5px;color:var(--sub);line-height:1.5;}

.icon-moon{display:none;}
body.dark .icon-sun{display:none;}
body.dark .icon-moon{display:block;}

/* controls row */
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700;}
select,input[type=date]{
  font-family:inherit;font-size:13px;background:var(--bg);color:var(--ink);
  border:1px solid var(--line);border-radius:7px;padding:6px 9px;
}
.stat{text-align:right;}
.stat .num{font-size:20px;font-weight:900;color:var(--accent);line-height:1;white-space:nowrap;}
.stat .lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:2px;}

/* unit toggle */
.unit-toggle{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;height:32px;}
.unit-toggle button{
  font-family:inherit;font-size:12px;font-weight:700;padding:0 10px;border:none;
  background:transparent;color:var(--sub);cursor:pointer;
}
.unit-toggle button.on{background:var(--accent);color:#fff;}
body.dark .unit-toggle button.on{color:#0B1410;}

/* color toggle */
.color-section{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.color-section label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:700;}
.switch{position:relative;width:38px;height:21px;background:var(--bg);border:1px solid var(--line);border-radius:11px;cursor:pointer;flex-shrink:0;}
.switch .knob{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--sub);transition:left .15s,background .15s;}
.switch.on{background:var(--accent-soft);border-color:var(--accent);}
.switch.on .knob{left:19px;background:var(--accent);}
.legend{display:flex;gap:10px;flex-wrap:wrap;opacity:.35;transition:opacity .2s;}
.legend.active{opacity:1;}
.legend .item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);font-weight:600;white-space:nowrap;}
.legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── MAIN ── */
.main{padding:20px 24px 40px;display:flex;justify-content:flex-start;overflow-x:auto;}
.grid-wrap{display:inline-block;}

table{border-collapse:separate;border-spacing:7px;width:auto;}
td{padding:0;}
th{font-size:10.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;
  padding:0 4px 7px;font-weight:700;text-align:left;}
th.week-th{width:140px;}

/* Week tile — backwards L (right + bottom border only) */
td.week-col{
  width:140px;vertical-align:middle;text-align:center;padding:10px 10px;
  background:var(--week-bg);
  border-top:none;border-left:none;
  border-right:2.5px solid var(--week-border);
  border-bottom:2.5px solid var(--week-border);
  border-radius:0 0 4px 0;
}
td.week-col.current-week{
  border-right-color:var(--ink);
  border-bottom-color:var(--ink);
}
.week-num{font-size:21px;font-weight:900;display:block;color:var(--ink);}
.week-range{font-size:12px;color:var(--sub);display:block;margin-top:4px;font-weight:600;white-space:nowrap;}
.week-total{font-size:15px;color:var(--accent);display:block;margin-top:6px;font-weight:800;white-space:nowrap;}

/* Day tiles */
.day-cell{
  background:var(--tile);
  border-radius:10px;
  border:1.5px solid var(--tile-border);
  padding:10px 11px;
  width:146px;
  height:118px;
  cursor:grab;
  display:flex;flex-direction:column;gap:4px;
  overflow:hidden;
  transition:border-color .1s;
  position:relative;
}
.day-cell:active{cursor:grabbing;}
.day-cell.over{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent) inset;}
.day-cell.dragging{opacity:.3;}
.day-cell.blank{
  background:transparent;border:1.5px dashed var(--line);
  cursor:default;opacity:.5;
}

/* Color buckets (applied when body.colorcode) */
body.colorcode .bucket-rest{background:var(--c-rest);opacity:.85;}
body.colorcode .bucket-xtrain{background:var(--c-rest);opacity:.75;}
body.colorcode .bucket-cross{background:var(--c-rest);opacity:.75;}
body.colorcode .bucket-recovery{background:var(--c-recovery);}
body.colorcode .bucket-easy{background:var(--c-easy);}
body.colorcode .bucket-long{border-color:var(--accent);border-width:2px;}
body.colorcode .bucket-long .tile-type{color:var(--accent);}
body.colorcode .bucket-medlong{border-color:var(--c-medlong-border,#1a8a8a);border-width:2px;}
body.colorcode .bucket-medlong .tile-type{color:var(--c-medlong-border,#1a8a8a);}
body.colorcode .bucket-lt{background:var(--c-lt);}
body.colorcode .bucket-mp{background:var(--c-mp);border-color:var(--accent);border-width:2px;}
body.colorcode .bucket-mp .tile-type{color:var(--accent);}
body.colorcode .bucket-vo2{background:var(--c-vo2);}
body.colorcode .bucket-race{background:var(--c-race);border-color:var(--danger,#c0392b);border-width:2px;}
body.colorcode .bucket-tuneup{background:var(--c-tuneup);border-color:#d4689a;border-width:2px;}
body.colorcode .bucket-tuneup .tile-type{color:#b83a72;}

/* Tile text */
.tile-type{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;
  color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:none;border:none;padding:0;width:100%;cursor:pointer;text-align:left;
}
.tile-type:focus{outline:none;color:var(--ink);}
.tile-type option{text-transform:none;}

.tile-dist-row{display:flex;align-items:baseline;gap:3px;}
.tile-dist{
  font-size:19px;font-weight:700;color:var(--ink);
  background:transparent;border:none;border-bottom:1.5px solid transparent;
  padding:0 0 1px;width:68px;
}
.tile-dist:focus{outline:none;border-bottom-color:var(--accent);}
.tile-dist::placeholder{color:var(--sub);}
.tile-unit{font-size:11.5px;color:var(--sub);font-weight:700;}
.tile-time-flag{font-size:9px;color:var(--sub);font-weight:700;text-transform:uppercase;margin-left:2px;}

.tile-note{
  background:transparent;border:none;color:var(--sub);font-size:11.5px;
  padding:0;width:100%;flex:1;font-family:inherit;resize:none;line-height:1.35;
}
.tile-note:focus{outline:none;color:var(--ink);}
.tile-note::placeholder{color:var(--sub);opacity:.5;}

/* responsive */
@media(max-width:700px){
  .topbar-r1{padding:10px 14px;}
  .main{padding:14px 8px 40px;}
  .race-title{font-size:15px;}
  .topbar-r2{display:none;padding:10px 14px;}
  .topbar-r2.open{display:flex;}
  .expand-btn{display:flex;}
}
@media(min-width:701px){
  .expand-btn{display:none;}
  .topbar-r2{display:flex!important;}
}
.expand-btn{
  align-items:center;justify-content:center;
  background:none;border:1px solid var(--line);border-radius:7px;
  color:var(--sub);cursor:pointer;padding:4px 9px;font-size:11px;font-weight:700;
  flex-shrink:0;gap:4px;
}
.expand-btn svg{transition:transform .2s;}
.expand-btn.open svg{transform:rotate(180deg);}

/* ── RACE SWITCHER ── */
.race-switcher-wrap{position:relative;flex-shrink:0;}
.race-switcher{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;padding:2px 4px;
  border-radius:6px;font-family:inherit;color:var(--ink);
  font-size:17px;font-weight:800;letter-spacing:-.3px;
  max-width:260px;
}
.race-switcher:hover{background:var(--accent-soft);}
.race-name-display{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;
}
.race-name-display:empty::before{content:'Name your race…';color:var(--sub);font-weight:600;}
.race-chevron{flex-shrink:0;color:var(--sub);transition:transform .15s;}
.race-dropdown{
  display:none;position:absolute;top:calc(100% + 6px);left:0;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:50;min-width:240px;overflow:hidden;
}
.race-dropdown.open{display:block;}
.race-name-input{
  display:block;width:100%;font-family:inherit;font-size:14px;font-weight:700;
  background:transparent;border:none;border-bottom:1px solid var(--line);
  padding:12px 14px;color:var(--ink);outline:none;
}
.race-name-input::placeholder{color:var(--sub);}
.race-name-input:focus{background:var(--accent-soft);}
.race-list{max-height:180px;overflow-y:auto;}
.race-list-row{
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--line);
}
.race-list-row:last-child{border-bottom:none;}
.race-list-btn{
  flex:1;background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--ink);padding:10px 14px;text-align:left;
}
.race-list-btn:hover{background:var(--accent-soft);color:var(--accent);}
.race-delete-btn{
  background:none;border:none;cursor:pointer;
  color:var(--sub);font-size:15px;font-weight:700;
  padding:10px 12px;line-height:1;flex-shrink:0;
}
.race-delete-btn:hover{color:var(--danger);}
.race-add-btn{
  display:flex;align-items:center;gap:6px;width:100%;
  background:none;border:none;border-top:1px solid var(--line);
  cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;
  color:var(--accent);padding:10px 14px;
}
.race-add-btn:hover{background:var(--accent-soft);}

.week-export-btn{
  display:none;background:none;border:1px solid var(--line);border-radius:5px;
  cursor:pointer;color:var(--sub);font-size:10px;font-weight:700;
  padding:2px 6px;margin-top:6px;align-items:center;gap:3px;
  white-space:nowrap;transition:color .1s,border-color .1s;
}
.week-col:hover .week-export-btn{display:inline-flex;}
.week-export-btn:hover{color:var(--accent);border-color:var(--accent);}


/* ── MODAL OVERLAY ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--panel);border-radius:14px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.2);width:340px;max-width:92vw;}

/* ── BUTTONS ── */
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:#fff;transition:opacity .15s;}
.btn:hover{opacity:.85;}
body.dark .btn{color:#0B1410;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{background:var(--accent-soft);opacity:1;}
.btn-use{background:var(--accent);color:#fff;}
body.dark .btn-use{color:#0B1410;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-r1">
    <div class="race-switcher-wrap">
      <button class="race-switcher" id="raceSwitcher">
        <span class="race-name-display" id="raceNameDisplay"></span>
        <svg class="race-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
      </button>
      <div class="race-dropdown" id="raceDropdown">
        <input type="text" class="race-name-input" id="raceNameInput" placeholder="Race name…" autocomplete="off">
        <div class="race-list" id="raceList"></div>
        <button class="race-add-btn" id="addRaceBtn">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          New race
        </button>
      </div>
    </div>
    <button class="icon-btn" id="exportAllBtn" title="Export full plan to iCal">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="16" height="15" rx="2"/>
        <line x1="2" y1="8" x2="18" y2="8"/>
        <line x1="6" y1="1" x2="6" y2="5"/>
        <line x1="14" y1="1" x2="14" y2="5"/>
        <line x1="10" y1="12" x2="10" y2="17"/>
        <polyline points="7,14 10,17 13,14"/>
      </svg>
    </button>
    <nav class="pagenav">
      <a href="index.html" class="active">Calendar</a>
      <a href="library.html">Library</a>
    </nav>
    <button class="icon-btn" id="syncBtn" title="Settings &amp; sync">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"/>
      </svg>
      <span class="sync-dot" id="syncDot"></span>
    </button>
    <button class="expand-btn" id="expandBtn" aria-label="Show controls"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="2,4 7,10 12,4"/></svg></button>
    <button class="mode-btn" id="modeBtn" title="Toggle dark/light mode" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <circle cx="10" cy="10" r="3.4"/><line x1="10" y1="1.5" x2="10" y2="3.5"/><line x1="10" y1="16.5" x2="10" y2="18.5"/>
        <line x1="1.5" y1="10" x2="3.5" y2="10"/><line x1="16.5" y1="10" x2="18.5" y2="10"/>
        <line x1="4.1" y1="4.1" x2="5.6" y2="5.6"/><line x1="14.4" y1="14.4" x2="15.9" y2="15.9"/>
        <line x1="15.9" y1="4.1" x2="14.4" y2="5.6"/><line x1="5.6" y1="14.4" x2="4.1" y2="15.9"/>
      </svg>
      <svg class="icon-moon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 10.5a5.5 5.5 0 0 1-5.5-5.5 5.5 5.5 0 1 0 5.5 10.5 5.5 5.5 0 0 1 0-5z"/>
      </svg>
    </button>
  </div>
  <div class="topbar-r2">
    <div class="field">
      <label>Plan</label>
      <select id="planSelect"></select>
    </div>
    <div class="field">
      <label>Race date</label>
      <input type="date" id="raceDate">
    </div>
    <div class="field">
      <label>Week starts</label>
      <select id="startDay">
        <option value="0">Sunday</option>
        <option value="1" selected>Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
    </div>
    <div class="stat">
      <div class="num" id="totalMiles">0</div>
      <div class="lbl" id="totalLbl">total plan miles</div>
    </div>
    <div class="field">
      <label>Units</label>
      <div class="unit-toggle">
        <button id="unitMi" class="on" onclick="setUnit('mi')">mi</button>
        <button id="unitKm" onclick="setUnit('km')">km</button>
      </div>
    </div>

<script>
// ── PERSISTENCE: GitHub Gist + localStorage ───────────────────────────────
// Stores all app state in a private GitHub Gist (cross-device) with
// localStorage as instant-load cache. PAT is stored per-device only.
// ─────────────────────────────────────────────────────────────────────────
const State = (() => {
  const FILE = 'stride-runplan.json';
  const DESC = 'Stride Run Plan — sync data (do not edit manually)';
  const LS = { pat:'stride_pat', gist:'stride_gist_id', data:'stride_data' };

  const DEFAULTS = {
    v: 1,
    prefs: { dark:false, unit:'mi', colorCoding:false },
    library: { authorOrder:null, hiddenIds:[], customPlans:[] },
    activeRaceId: null,
    races: {}
  };

  const RACE_DEFAULTS = {
    planId:'pfitz-18-55-70', raceName:'', raceDate:'', weekStartDay:1,
    baseSchedule:null, baseMeta:null, edits:{ weeks:[] }
  };

  // Deep-merge src into defaults (defaults fill in any missing keys)
  function merge(def, src) {
    if (!src || typeof src !== 'object') return JSON.parse(JSON.stringify(def));
    const out = JSON.parse(JSON.stringify(def));
    Object.keys(src).forEach(k => {
      if (k in out && src[k] !== null && typeof src[k]==='object' && !Array.isArray(src[k]))
        out[k] = merge(out[k], src[k]);
      else if (src[k] !== undefined) out[k] = src[k];
    });
    return out;
  }

  let _pat=null, _gistId=null, _data=null;
  let _saveTimer=null, _status='offline';
  const _cbs=[];

  const emit = s => { _status=s; _cbs.forEach(cb=>cb(s)); };
  const lsGet = k => { try{return JSON.parse(localStorage.getItem(k));}catch{return null;} };
  const lsSave = () => { try{localStorage.setItem(LS.data,JSON.stringify(_data));}catch{} };

  async function gh(method, path, body) {
    const r = await fetch('https://api.github.com'+path, {
      method,
      headers:{
        Authorization:'Bearer '+_pat,
        Accept:'application/vnd.github+json',
        'Content-Type':'application/json',
        'X-GitHub-Api-Version':'2022-11-28'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error('GitHub API '+r.status+' '+r.statusText);
    return r.json();
  }

  async function loadOrCreateGist() {
    // Try cached gist id first
    if (_gistId) {
      try {
        const g = await gh('GET','/gists/'+_gistId);
        const c = g.files[FILE]?.content;
        return c ? JSON.parse(c) : null;
      } catch { _gistId=null; }
    }
    // Search existing gists
    const list = await gh('GET','/gists?per_page=100');
    const found = list.find(g => g.files[FILE]);
    if (found) {
      _gistId = found.id;
      localStorage.setItem(LS.gist, _gistId);
      const g = await gh('GET','/gists/'+_gistId);
      const c = g.files[FILE]?.content;
      return c ? JSON.parse(c) : null;
    }
    // Create new private gist
    const created = await gh('POST','/gists',{
      description:DESC, public:false,
      files:{ [FILE]:{ content:JSON.stringify(JSON.parse(JSON.stringify(DEFAULTS)),null,2) } }
    });
    _gistId = created.id;
    localStorage.setItem(LS.gist, _gistId);
    return JSON.parse(JSON.stringify(DEFAULTS));
  }

  async function pushGist() {
    if (!_pat||!_gistId) return;
    await gh('PATCH','/gists/'+_gistId,{
      files:{ [FILE]:{ content:JSON.stringify(_data,null,2) } }
    });
  }

  function schedulePush() {
    lsSave();
    emit('pending');
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(async ()=>{
      if (!_pat) { emit('offline'); return; }
      try { emit('syncing'); await pushGist(); emit('synced'); }
      catch(e){ console.warn('Gist push failed:',e); emit('error'); }
    }, 1800);
  }

  return {
    // Call once on page load. Loads localStorage immediately,
    // then fetches Gist in background and updates.
    async init() {
      try { _pat    = localStorage.getItem(LS.pat); } catch { _pat = null; }
      try { _gistId = localStorage.getItem(LS.gist); } catch { _gistId = null; }
      _data = merge(DEFAULTS, lsGet(LS.data));
      lsSave();
      if (!_pat) { emit('offline'); return; }
      try {
        emit('syncing');
        const remote = await loadOrCreateGist();
        if (remote) { _data = merge(DEFAULTS, remote); lsSave(); }
        emit('synced');
      } catch(e) { console.warn('Gist init failed:',e); emit('error'); }
    },

    get(path) {
      return path.split('.').reduce((o,k)=>o?.[k], _data);
    },

    set(path, value) {
      const keys=path.split('.'), last=keys.pop();
      const node=keys.reduce((o,k)=>{ if(o[k]==null||typeof o[k]!=='object')o[k]={}; return o[k]; },_data);
      node[last]=value;
      schedulePush();
    },

    // Connect a PAT for the first time (or reconnect after disconnect).
    // Validates token, finds/creates Gist, merges remote data.
    async connect(token) {
      _pat = token.trim();
      localStorage.setItem(LS.pat, _pat);
      try {
        emit('syncing');
        const remote = await loadOrCreateGist();
        if (remote) { _data = merge(DEFAULTS, remote); lsSave(); }
        emit('synced');
        return { ok:true };
      } catch(e) {
        _pat=null; localStorage.removeItem(LS.pat);
        emit('offline');
        return { ok:false, err:e.message };
      }
    },

    disconnect() {
      _pat=null; _gistId=null;
      localStorage.removeItem(LS.pat);
      localStorage.removeItem(LS.gist);
      emit('offline');
    },

    hasPAT()  { return !!_pat; },
    status()  { return _status; },
    onStatus(cb) { _cbs.push(cb); cb(_status); }
  };
})();


// Convert library sched format [[label,note,dist,km],...] to calendar week format
function schedToWeeks(sched) {
  return sched.map(week => ({
    days: week.map(([label, note, dist]) => ({
      type:  label || 'Run',
      bucket: getTypeBucket(label || ''),
      dist:  dist || '0',
      note:  (note && note !== label) ? note : (label||''),
      noteKm:'',
      fullTitle: note || label || ''
    }))
  }));
}

// ─────────────────────────────────────────────────────────────
// TYPE LABEL EXTRACTION
// Strip {mi:km} annotations smartly:
//   • First {..} in a title duplicates the distance field → strip
//   • Subsequent {..} carry embedded workout distances → show as "X mi"
// This fixes "Marathon-pace run with at marathon pace" (was stripping {10:16})
// and "8K–15K tune-up race (total )" (was stripping {10-14:16-23})
// ─────────────────────────────────────────────────────────────
function extractTypeLabel(title) {
  let s = title
    .replace(/\{[^}]+\}/g, '')          // strip all {..}
    .replace(/\s+with\s+.*/i, '')       // strip "with ..."
    .replace(/\s*;.*/i, '')             // strip "; ..."
    .replace(/\s*\(total\s*\)/i, '')    // strip "(total)"
    .replace(/\s*\(\s*\)\s*$/, '')      // strip empty parens
    .replace(/\s+/g, ' ').trim();
  const MAP = {
    'Rest or cross-train':'Rest/Cross-Train',
    'Rest or Cross-Train':'Rest/Cross-Train',
  };
  // Normalize tune-up race variants → "Tune-up race"
  if (/tune.?up race/i.test(s)) return 'Tune-up race';
  // Normalize gen-aerobic + speed → Gen-aerobic
  if (/^gen-aerobic\s*\+\s*speed/i.test(s) || /^gen-aerobic\s*\+\s*speed/i.test(s)) return 'Gen-aerobic';
  // Normalize VO2max variants
  if (/^v[̇]?[oO][₂2]max$/i.test(s) || /^VO₂max$/i.test(s)) return 'VO₂max';
  return MAP[s] || s || 'Run';
}

function cleanNote(title, units) {
  // Strip first {..} (duplicates distance tile), convert rest to "X mi/km"
  let first = true;
  let result = title.replace(/\{([^}]+)\}/g, (match, inner) => {
    if (first) { first = false; return ''; }
    const parts = inner.split(':');
    const mi = parts[0].trim(), km = (parts[1]||'').trim();
    return units === 'km' && km ? km + ' km' : mi + ' mi';
  });
  result = result
    .replace(/\(total\s*\)/gi, '').replace(/\(\s*\)/g, '')
    .replace(/\s+/g, ' ').trim();
  return result;
}

function getTypeBucket(label) {
  const l = label.toLowerCase();
  if (l === '' || (l.startsWith('rest') && !l.includes('recovery'))) return 'rest';
  if (l.startsWith('rest/x')) return 'xtrain';
  if (l.startsWith('recovery') || l.startsWith('dress rehearsal')) return 'recovery';
  if (l.includes('cross') || l.includes('strength')) return 'cross';
  if (l.includes('tune-up') || l.includes('tune up')) return 'tuneup';
  if (l.includes('goal marathon')) return 'race';
  if (l.includes('race') && !l.includes('race pace') && !l.includes('marathon-pace') && !l.includes('marathon pace')) return 'race';
  if (l.startsWith('long run') || l.includes('progression long')) return 'long';
  if (l.startsWith('med-long') || l.startsWith('medium-long')) return 'medlong';
  if (l.includes('marathon-pace') || l.includes('marathon pace') || l === 'mp' || l.startsWith('race pace')) return 'mp';
  // gen-aerobic (with or without + speed) → easy. Must come before speed check.
  if (l.startsWith('gen-aerobic') || l.startsWith('general aerobic')) return 'easy';
  // VO2max and intervals are the same intensity
  if ((l.includes('vo') && l.includes('max')) || l.startsWith('vo₂') || l.startsWith('v̇o') || l.includes('interval') || l === 'speed' || l.startsWith('speed ')) return 'vo2';
  if (l === 'lt' || l.startsWith('lt ') || l.includes('lactate') || l.includes('tempo')) return 'lt';
  if (l.includes('speed')) return 'vo2';   // catch "X + speed" combos not already handled
  return 'easy';
}

  xtrain:   {dark:'#5a5e66', light:'#9a9ea6'},   // same as rest — both are non-run days
  cross:    {dark:'#5a5e66', light:'#9a9ea6'},   // same as rest
  recovery: {dark:'#6a80a8', light:'#4a6080'},   // matches --c-recovery blue-gray
  easy:     {dark:'#4a9e6a', light:'#2e7a4e'},   // matches --c-easy green
  medlong:  {dark:'#2aaeae', light:'#1a8a8a'},   // matches --c-medlong-border teal
  long:     {dark:'#2a7e4a', light:'#0e5a2e'},   // matches --accent dark green
  lt:       {dark:'#c8b020', light:'#9a8600'},   // matches --c-lt yellow family
  mp:       {dark:'#2a9e5a', light:'#1a7a3e'},   // matches --c-mp green
  vo2:      {dark:'#9466d4', light:'#7040b4'},   // matches --c-vo2 purple
  race:     {dark:'#d44a4a', light:'#b82828'},   // matches --c-race red
  tuneup:   {dark:'#d46896', light:'#b83a72'},   // matches --c-tuneup pink
};

// ─────────────────────────────────────────────────────────────
// PLANS REGISTRY — small set embedded in calendar for now;
// full library plans are in library.html and handed off via ?plan=
// ─────────────────────────────────────────────────────────────
function distStr(dist) {
  if (dist == null) return '';
  if (Array.isArray(dist)) {
    if (!dist.length) return '';
    if (dist.length === 1) return fmt(dist[0]);
    const [lo, hi] = dist;
    return lo === hi ? fmt(lo) : `${fmt(lo)}-${fmt(hi)}`;
  }
  return fmt(dist);
}
function fmt(n) { return n === Math.floor(n) ? String(n) : String(n); }

function buildPfitzPlan() {
  return {
    name: 'Pfitzinger/Douglas: 55–70 mi/wk, 18-week',
    raceDistance: 'Marathon',
    units: 'mi',
    weeks: PFITZ_SCHEDULE.map(week => ({
      days: week.workouts.map(w => {
        const label = extractTypeLabel(w.title);
        return {
          type:   label,
          bucket: getTypeBucket(label),
          dist:   distStr(w.distance),
          note:   cleanNote(w.title, 'mi'),
          noteKm: cleanNote(w.title, 'km'),
          fullTitle: w.title
        };
      })
    }))
  };
}

function buildSynth(name, raceDistance, units, weeks) {
  const taper = Math.max(2, Math.round(weeks * 0.15));
  return {
    name, raceDistance, units,
    weeks: Array.from({length: weeks}, (_, wi) => {
      const wk = wi + 1, isTaper = wk > weeks - taper;
      const isRace = wk === weeks;
      const scale = isTaper ? 0.6 : 0.85 + (wi / (weeks - taper)) * 0.15;
      const base = raceDistance === 'Marathon' ? 55 : raceDistance === 'Half Marathon' ? 30 : 20;
      const peak = Math.min(base * scale, base);
      return {
        days: [
          {type:'Rest',      bucket:'rest',     dist:'0',  note:'', noteKm:''},
          {type:'Easy',      bucket:'easy',     dist:String(Math.round(peak*0.13)), note:'', noteKm:''},
          {type:'Tempo',     bucket:'lt',       dist:String(Math.round(peak*0.12)), note:'', noteKm:''},
          {type:'Easy',      bucket:'easy',     dist:String(Math.round(peak*0.11)), note:'', noteKm:''},
          {type:'Rest',      bucket:'rest',     dist:'0',  note:'', noteKm:''},
          {type:'Intervals', bucket:'vo2',      dist:String(Math.round(peak*0.10)), note:'', noteKm:''},
          {type: isRace?'Race':'Long Run', bucket: isRace?'race':'long',
           dist: isRace?(raceDistance==='Marathon'?'26.2':raceDistance==='Half Marathon'?'13.1':'3.1'):String(Math.round(peak*0.35)),
           note: isRace?'RACE DAY':'', noteKm:''},
        ]
      };
    })
  };
}

const PLANS = {
  'pfitz-18-55-70': buildPfitzPlan,
  'half-12wk':      () => buildSynth('Half Marathon — 12 Week', 'Half Marathon', 'mi', 12),
  '5k-8wk':         () => buildSynth('5K — 8 Week', '5K', 'mi', 8),
};
const PLAN_LABELS = {
  'pfitz-18-55-70': 'Marathon — Pfitzinger 18wk (55–70 mi/wk)',
  'half-12wk':      'Half Marathon — 12 Week',
  '5k-8wk':         '5K — 8 Week',
};

function clone(o) { return JSON.parse(JSON.stringify(o)); }

// ─────────────────────────────────────────────────────────────
// DISTANCE UTILS
// ─────────────────────────────────────────────────────────────
function parseDist(raw) {
  const s = String(raw||'').trim();
  if (!s || s === '0') return {total:0, isTime:false};
  if (/min|hr|:/i.test(s)) return {total:0, isTime:true};
  const rm = s.match(/^([\d.]+)\s*[-–]\s*([\d.]+)$/);
  if (rm) return {total:(parseFloat(rm[1])+parseFloat(rm[2]))/2, isRange:true, isTime:false};
  const n = parseFloat(s);
  return {total: isNaN(n)?0:n, isTime:false};
}

function convertDist(distStr, toKm) {
  if (!toKm || !distStr) return distStr;
  const s = String(distStr).trim();
  if (/min|hr|:/i.test(s)) return s;
  const rm = s.match(/^([\d.]+)\s*[-–]\s*([\d.]+)$/);
  if (rm) {
    const lo = (parseFloat(rm[1])*1.60934).toFixed(0);
    const hi = (parseFloat(rm[2])*1.60934).toFixed(0);
    return lo+'-'+hi;
  }
  const n = parseFloat(s);
  return isNaN(n) ? s : (n*1.60934).toFixed(1);
}

function weekMileage(week) {
  return week.days.reduce((s,d) => s + parseDist(d.dist).total, 0);
}

// ─────────────────────────────────────────────────────────────
// DATE UTILS
// ─────────────────────────────────────────────────────────────
const DAY_NAMES_FROM = (dow) => {
  const all = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return [...all.slice(dow), ...all.slice(0, dow)];
};

function firstWeekStart() {
  const n = planData.weeks.length;
  const race = new Date(raceDate + 'T00:00:00');
  const diff = (race.getDay() - startDow + 7) % 7;
  const finalStart = new Date(race); finalStart.setDate(race.getDate() - diff);
  const first = new Date(finalStart); first.setDate(finalStart.getDate() - (n-1)*7);
  return first;
}

function fmtDate(d) { return (d.getMonth()+1)+'/'+d.getDate(); }

function isCurrentWeek(weekStart) {
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(weekStart); end.setDate(weekStart.getDate()+6);
  return today >= weekStart && today <= end;
}

// ─────────────────────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────────────────────
function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const seen = new Set();
  if (!planData) return;
  planData.weeks.forEach(w => w.days.forEach(d => {
    if (seen.has(d.bucket)) return;
    seen.add(d.bucket);
    const isDark = document.body.classList.contains('dark');
    const col = (BUCKET_COLORS[d.bucket]||{})[isDark?'dark':'light'] || '#888';
    const item = document.createElement('div'); item.className='item';
    item.innerHTML = `<span class="dot" style="background:${col}"></span>${d.type}`;
    legend.appendChild(item);
  }));
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function updateTotals(rows) {
  const total = rows ? rows.reduce((s,r) => s + r.days.reduce((ss,d) => ss + parseDist(d.dist).total, 0), 0)
                     : planData.weeks.reduce((s,w) => s + weekMileage(w), 0);
  const disp = unit === 'km' ? (total * 1.60934).toFixed(1) : total.toFixed(1);
  document.getElementById('totalMiles').textContent = disp;
  document.getElementById('totalLbl').textContent = 'total plan ' + (unit === 'km' ? 'km' : 'miles');
  document.querySelectorAll('.week-total-span').forEach((el, i) => {
    const w = planData.weeks[i];
    if (!w) return;
    const t = weekMileage(w);
    el.textContent = (unit==='km' ? (t*1.60934).toFixed(1) : t.toFixed(1)) + ' ' + unit;
  });
}

function render() {
  if (!planData || !raceDate) return;

  // Header row days
  const headerRow = document.getElementById('headerRow');
  headerRow.innerHTML = '<th class="week-th">Week</th>';
  DAY_NAMES_FROM(startDow).forEach(n => {
    const th = document.createElement('th'); th.textContent = n;
    headerRow.appendChild(th);
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const start = firstWeekStart();

  planData.weeks.forEach((week, wi) => {
    const tr = document.createElement('tr');

    // Week cell (backwards-L border)
    const wkTd = document.createElement('td'); wkTd.className = 'week-col';
    const wkStart = new Date(start); wkStart.setDate(start.getDate() + wi*7);
    const wkEnd = new Date(wkStart); wkEnd.setDate(wkStart.getDate()+6);
    if (isCurrentWeek(wkStart)) wkTd.classList.add('current-week');
    const t = weekMileage(week);
    const tDisp = unit==='km' ? (t*1.60934).toFixed(1) : t.toFixed(1);
    wkTd.innerHTML = `<span class="week-num">W${wi+1}</span><span class="week-range">${fmtDate(wkStart)}–${fmtDate(wkEnd)}</span><span class="week-total week-total-span">${tDisp} ${unit}</span>`;

    // Per-week iCal export button (visible on hover)
    const wkExBtn = document.createElement('button');
    wkExBtn.className = 'week-export-btn';
    wkExBtn.title = `Export week ${wi+1} to iCal`;
    wkExBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="1" x2="7" y2="10"/><polyline points="3,7 7,11 11,7"/><line x1="1" y1="13" x2="13" y2="13"/></svg> W'+(wi+1)+' .ics';
    wkExBtn.addEventListener('click', e => {
      e.stopPropagation();
      const raceName = currentRaceName();
      generateIcal([planData.weeks[wi]], wi, slugify(raceName)+'-week-'+(wi+1)+'.ics');
    });
    wkTd.appendChild(wkExBtn);
    tr.appendChild(wkTd);

    week.days.forEach((day, di) => {
      const td = document.createElement('td');
      const cell = document.createElement('div');
      cell.className = 'day-cell bucket-' + (day.bucket||'easy');
      cell.draggable = true;
      if (day.fullTitle) cell.title = day.fullTitle;

      // Type — styled select using plan's actual type labels
      const planTypes = [...new Set(planData.weeks.flatMap(w => w.days.map(d => d.type)))].sort();
      const sel = document.createElement('select'); sel.className = 'tile-type';
      planTypes.forEach(t => {
        const o = document.createElement('option'); o.value = t; o.textContent = t;
        if (t === day.type) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('mousedown', e => e.stopPropagation());
      sel.addEventListener('change', () => {
        day.type = sel.value;
        day.bucket = getTypeBucket(sel.value);
        cell.className = 'day-cell bucket-' + day.bucket;
        buildLegend();
        schedulePlanSave();
      });

      // Distance
      const distRow = document.createElement('div'); distRow.className = 'tile-dist-row';
      const distInput = document.createElement('input');
      distInput.type = 'text'; distInput.className = 'tile-dist';
      const dispDist = unit === 'km' ? convertDist(day.dist, true) : day.dist;
      distInput.value = dispDist || '';
      distInput.placeholder = '0';
      distInput.addEventListener('mousedown', e => e.stopPropagation());
      distInput.addEventListener('input', () => {
        // Store back in mi regardless of display unit
        const raw = distInput.value;
        if (unit === 'km') {
          const rm = raw.match(/^([\d.]+)\s*[-–]\s*([\d.]+)$/);
          if (rm) day.dist = (parseFloat(rm[1])/1.60934).toFixed(1) + '-' + (parseFloat(rm[2])/1.60934).toFixed(1);
          else { const n = parseFloat(raw); day.dist = isNaN(n) ? raw : (n/1.60934).toFixed(2); }
        } else {
          day.dist = raw;
        }
        timeFlag.style.display = parseDist(raw).isTime ? 'inline' : 'none';
        updateTotals();
        schedulePlanSave();
      });
      const unitSpan = document.createElement('span'); unitSpan.className = 'tile-unit'; unitSpan.textContent = unit;
      const timeFlag = document.createElement('span'); timeFlag.className = 'tile-time-flag'; timeFlag.textContent = 'time';
      timeFlag.style.display = parseDist(day.dist).isTime ? 'inline' : 'none';
      distRow.append(distInput, unitSpan, timeFlag);

      // Note
      const noteEl = document.createElement('textarea');
      noteEl.className = 'tile-note'; noteEl.rows = 2;
      const noteText = unit === 'km' ? (day.noteKm || day.note) : day.note;
      noteEl.value = noteText || '';
      noteEl.placeholder = 'note';
      noteEl.addEventListener('mousedown', e => e.stopPropagation());
      noteEl.addEventListener('input', () => { day.note = noteEl.value; schedulePlanSave(); });

      cell.append(sel, distRow, noteEl);

      // Drag & drop
      cell.addEventListener('dragstart', e => {
        cell.classList.add('dragging');
        e.dataTransfer.setData('application/json', JSON.stringify({wi, di}));
      });
      cell.addEventListener('dragend', () => cell.classList.remove('dragging'));
      cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('over'); });
      cell.addEventListener('dragleave', () => cell.classList.remove('over'));
      cell.addEventListener('drop', e => {
        e.preventDefault(); cell.classList.remove('over');
        const src = JSON.parse(e.dataTransfer.getData('application/json'));
        const a = planData.weeks[src.wi].days[src.di];
        const b = day;
        [a.type,b.type]=[b.type,a.type]; [a.bucket,b.bucket]=[b.bucket,a.bucket];
        [a.dist,b.dist]=[b.dist,a.dist]; [a.note,b.note]=[b.note,a.note];
        [a.noteKm,b.noteKm]=[b.noteKm,a.noteKm];
        render();
        schedulePlanSave();
      });

      td.appendChild(cell);
      tr.appendChild(td);
    });
    grid.appendChild(tr);
  });

  buildLegend();
  updateTotals();
}

// ─────────────────────────────────────────────────────────────
// ICAL EXPORT
// ─────────────────────────────────────────────────────────────
const REST_BUCKETS = new Set(['rest','xtrain']);

function escIcal(s) {
  return String(s || '')
    .replace(/\\/g, '\\\\')
    .replace(/;/g,  '\\;')
    .replace(/,/g,  '\\,')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '');
}

function icalDate(d) {
  return d.getFullYear()
    + String(d.getMonth()+1).padStart(2,'0')
    + String(d.getDate()).padStart(2,'0');
}

function currentRaceName() {
  return document.getElementById('raceNameDisplay').textContent.trim() || 'Run Plan';
}

// weeksSubset  – array of week objects to export
// weekOffset   – index of first week in the full plan (for correct dates)
// filename     – download filename
function generateIcal(weeksSubset, weekOffset, filename) {
  const raceName = currentRaceName();
  const planStart = firstWeekStart();
  const stamp = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Stride Run Plan//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:' + escIcal(raceName),
  ];

  weeksSubset.forEach((week, i) => {
    const wi = weekOffset + i;
    week.days.forEach((day, di) => {
      if (REST_BUCKETS.has(day.bucket)) return;   // skip rest days
      if (!day.dist || day.dist === '0') return;  // skip zero-distance

      const date = new Date(planStart);
      date.setDate(planStart.getDate() + wi*7 + di);
      const nextDay = new Date(date);
      nextDay.setDate(date.getDate() + 1);

      const dist = unit === 'km'
        ? convertDist(day.dist, true) + ' km'
        : day.dist + ' mi';
      const summary = `${day.type} — ${dist}`;
      const note = (unit === 'km' ? (day.noteKm || day.note) : day.note) || '';

      lines.push(
        'BEGIN:VEVENT',
        'UID:stride-w'+(wi+1)+'-d'+(di+1)+'@kitnco',
        'DTSTAMP:'+stamp,
        'DTSTART;VALUE=DATE:'+icalDate(date),
        'DTEND;VALUE=DATE:'+icalDate(nextDay),
        'SUMMARY:'+escIcal(summary),
      );
      if (note) lines.push('DESCRIPTION:'+escIcal(note));
      lines.push('END:VEVENT');
    });
  });

  lines.push('END:VCALENDAR');

  const blob = new Blob([lines.join('\r\n')+'\r\n'], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function slugify(s) {
  return (s || 'run-plan').replace(/[^a-z0-9]+/gi, '-').replace(/^-|-$/g,'').toLowerCase();
}

// RACE SWITCHER
// ─────────────────────────────────────────────────────────────
function openRaceDropdown() {
  renderRaceList();
  document.getElementById('raceDropdown').classList.add('open');
  setTimeout(() => document.getElementById('raceNameInput').focus(), 30);
}
function closeRaceDropdown() {
  document.getElementById('raceDropdown').classList.remove('open');
}

function renderRaceList() {
  const races = State.get('races') || {};
  document.getElementById('raceNameInput').value = getRace('raceName') || '';
  const list = document.getElementById('raceList');
  list.innerHTML = '';
  Object.entries(races).forEach(([id, r]) => {
    if (id === activeRaceId) return;
    const row = document.createElement('div'); row.className = 'race-list-row';
    const btn = document.createElement('button'); btn.className = 'race-list-btn';
    btn.textContent = r.raceName || 'Unnamed Race';
    btn.addEventListener('click', () => { closeRaceDropdown(); switchRace(id); });
    const del = document.createElement('button'); del.className = 'race-delete-btn';
    del.textContent = '×'; del.title = 'Delete race';
    del.addEventListener('click', e => { e.stopPropagation(); deleteRace(id, r.raceName); });
    row.append(btn, del);
    list.appendChild(row);
  });
}

function switchRace(id) {
  activeRaceId = id;
  State.set('activeRaceId', id);
  loadRaceIntoUI();
}

function deleteRace(id, name) {
  const races = State.get('races') || {};
  if (Object.keys(races).length <= 1) { alert("Can't delete the only race."); return; }
  if (!confirm(`Delete "${name || 'Unnamed Race'}"? This can't be undone.`)) return;
  const updated = Object.fromEntries(Object.entries(races).filter(([k]) => k !== id));
  State.set('races', updated);
  if (id === activeRaceId) switchRace(Object.keys(updated)[0]);
  else renderRaceList();
}

function createNewRace() {
  const id = 'r' + Date.now();
  const d = new Date(); d.setDate(d.getDate() + 126);
  State.set('races.' + id, {
    planId: 'pfitz-18-55-70', raceName: '', raceDate: d.toISOString().slice(0,10),
    weekStartDay: 1, baseSchedule: null, baseMeta: null, edits: { weeks: [] }
  });
  closeRaceDropdown();
  switchRace(id);
  setTimeout(() => {
    openRaceDropdown();
    document.getElementById('raceNameInput').select();
  }, 50);
}

// Load the active race from state into all UI controls + re-render
function loadRaceIntoUI() {
  const race = getRace() || {};

  // Name display
  document.getElementById('raceNameDisplay').textContent = race.raceName || '';

  // Plan
  const planId = race.planId || Object.keys(PLANS)[0];
  const hasBuiltIn = planId && PLANS[planId];
  const hasExternal = race.baseSchedule && race.baseSchedule.length;
  currentPlanKey = hasBuiltIn ? planId : Object.keys(PLANS)[0];
  document.getElementById('planSelect').value = currentPlanKey;

  // Race date
  if (race.raceDate) raceDate = race.raceDate;
  else { const d = new Date(); d.setDate(d.getDate()+126); raceDate = d.toISOString().slice(0,10); }
  document.getElementById('raceDate').value = raceDate;

  // Week start day
  startDow = race.weekStartDay !== undefined ? race.weekStartDay : 1;
  document.getElementById('startDay').value = String(startDow);

  // Build planData
  if (hasBuiltIn) {
    planData = JSON.parse(JSON.stringify(PLANS[currentPlanKey]()));
  } else if (hasExternal) {
    planData = {
      name: race.baseMeta?.name || 'Loaded Plan',
      raceDistance: race.baseMeta?.type || 'Race',
      units: race.baseMeta?.units || 'mi',
      weeks: schedToWeeks(race.baseSchedule)
    };
  } else {
    planData = JSON.parse(JSON.stringify(PLANS[currentPlanKey]()));
  }

  // Restore tile edits
  const edits = race.edits?.weeks;
  const editsMatch = race.planId === currentPlanKey || (hasExternal && race.planId === planId);
  if (editsMatch && edits?.length && edits.length === planData.weeks.length) {
    planData.weeks = edits;
  }

  render();
}

async function setup() {
  // ── Init state ───────────────────────────────────────────────────────────
  try { await State.init(); } catch(e) { console.warn('State.init failed:', e); }

  // ── Preferences ──────────────────────────────────────────────────────────
  const prefs = State.get('prefs') || {};
  if (prefs.dark) document.body.classList.add('dark');
  if (prefs.unit) unit = prefs.unit;
  if (prefs.colorCoding) colorOn = true;

  // ── Migrate old state.race → state.races ─────────────────────────────────
  const legacyRace = State.get('race');
  const existingRaces = State.get('races') || {};
  if (legacyRace?.planId && Object.keys(existingRaces).length === 0) {
    const id = 'r' + Date.now();
    State.set('races.' + id, legacyRace);
    State.set('activeRaceId', id);
  }

  // ── Ensure at least one race exists ──────────────────────────────────────
  const races = State.get('races') || {};
  if (Object.keys(races).length === 0) {
    const id = 'r' + Date.now();
    const d = new Date(); d.setDate(d.getDate()+126);
    State.set('races.' + id, {
      planId:'pfitz-18-55-70', raceName:'', raceDate: d.toISOString().slice(0,10),
      weekStartDay:1, baseSchedule:null, baseMeta:null, edits:{weeks:[]}
    });
    State.set('activeRaceId', id);
  }

  // ── Set active race ───────────────────────────────────────────────────────
  activeRaceId = State.get('activeRaceId') || Object.keys(State.get('races'))[0];

  // ── Wire up plan selector ─────────────────────────────────────────────────
  const sel = document.getElementById('planSelect');
  Object.entries(PLAN_LABELS).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v;
    sel.appendChild(o);
  });
  sel.addEventListener('change', e => {
    const key = e.target.value;
    setRace('planId', key);
    setRace('edits', { weeks:[] });
    setRace('baseSchedule', null);
    loadPlan(key);
  });

  // ── Race date ─────────────────────────────────────────────────────────────
  document.getElementById('raceDate').addEventListener('change', e => {
    raceDate = e.target.value;
    setRace('raceDate', raceDate);
    setRace('edits', { weeks:[] });
    render();
  });

  // ── Week start day ────────────────────────────────────────────────────────
  document.getElementById('startDay').addEventListener('change', e => {
    startDow = parseInt(e.target.value);
    setRace('weekStartDay', startDow);
    render();
  });

  // ── Race name input ───────────────────────────────────────────────────────
  document.getElementById('raceNameInput').addEventListener('input', e => {
    const name = e.target.value;
    setRace('raceName', name);
    document.getElementById('raceNameDisplay').textContent = name;
  });

  // ── Race switcher dropdown ────────────────────────────────────────────────
  document.getElementById('raceSwitcher').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('raceDropdown');
    if (dd.classList.contains('open')) closeRaceDropdown();
    else openRaceDropdown();
  });
  document.getElementById('raceDropdown').addEventListener('click', e => e.stopPropagation());
  document.addEventListener('click', closeRaceDropdown);
  document.getElementById('addRaceBtn').addEventListener('click', createNewRace);

  // ── Prefs UI ──────────────────────────────────────────────────────────────
  document.getElementById('unitMi').classList.toggle('on', unit==='mi');
  document.getElementById('unitKm').classList.toggle('on', unit==='km');
  const ct = document.getElementById('colorToggle');
  if (colorOn) { ct.classList.add('on'); document.body.classList.add('colorcode'); document.getElementById('legend').classList.add('active'); }
  ct.addEventListener('click', () => {
    colorOn = !colorOn;
    ct.classList.toggle('on', colorOn);
    document.body.classList.toggle('colorcode', colorOn);
    document.getElementById('legend').classList.toggle('active', colorOn);
    State.set('prefs.colorCoding', colorOn);
  });

  document.getElementById('modeBtn').addEventListener('click', () => {
    const dark = document.body.classList.toggle('dark');
    State.set('prefs.dark', dark);
    buildLegend();
  });

  // ── iCal export ───────────────────────────────────────────────────────────
  document.getElementById('exportAllBtn').addEventListener('click', () => {
    if (!planData || !raceDate) return;
    generateIcal(planData.weeks, 0, slugify(currentRaceName()) + '.ics');
  });

  // ── Mobile expand ─────────────────────────────────────────────────────────
  const expandBtn = document.getElementById('expandBtn');
  const r2 = document.querySelector('.topbar-r2');
  expandBtn.addEventListener('click', () => {
    const open = r2.classList.toggle('open');
    expandBtn.classList.toggle('open', open);
  });

  // ── Sync modal ────────────────────────────────────────────────────────────
  const syncDot = document.getElementById('syncDot');
  const syncDotLg = document.getElementById('syncDotLg');
  const syncTxt = document.getElementById('syncStatusTxt');
  const LABELS = { offline:'Not connected', pending:'Saving…', syncing:'Syncing…', synced:'Synced', error:'Sync error — will retry' };

  State.onStatus(s => {
    [syncDot, syncDotLg].forEach(el => {
      if (el) { el.className = el.className.replace(/\b(synced|syncing|pending|error)\b/g,''); el.classList.add(s); }
    });
    if (syncTxt) syncTxt.textContent = LABELS[s] || s;
    const connected = s !== 'offline';
    const nc = document.getElementById('syncNotConnected');
    const cn = document.getElementById('syncConnected');
    if (nc) nc.style.display = connected ? 'none' : '';
    if (cn) cn.style.display = connected ? '' : 'none';
  });

  document.getElementById('syncBtn').addEventListener('click', () => {
    document.getElementById('syncModalBg').classList.add('open');
  });
  document.getElementById('syncModalBg').addEventListener('click', e => {
    if (e.target === document.getElementById('syncModalBg'))
      document.getElementById('syncModalBg').classList.remove('open');
  });
  document.getElementById('connectBtn').addEventListener('click', async () => {
    const token = document.getElementById('patInput').value.trim();
    const err = document.getElementById('connectErr');
    if (!token) { err.textContent = 'Please enter a token.'; err.style.display = ''; return; }
    err.style.display = 'none';
    document.getElementById('connectBtn').textContent = 'Connecting…';
    document.getElementById('connectBtn').disabled = true;
    const res = await State.connect(token);
    document.getElementById('connectBtn').textContent = 'Connect';
    document.getElementById('connectBtn').disabled = false;
    if (!res.ok) { err.textContent = 'Could not connect: ' + res.err; err.style.display = ''; }
    else { document.getElementById('patInput').value = ''; applyStateToUI(); }
  });
  document.getElementById('disconnectBtn').addEventListener('click', () => {
    if (!confirm("Disconnect this device? Your local data stays, but changes won't sync until you reconnect.")) return;
    State.disconnect();
  });

  // ── Load active race and render ───────────────────────────────────────────
  loadRaceIntoUI();
}

// Re-apply full state to UI (called after Gist connect)
async function applyStateToUI() {
  activeRaceId = State.get('activeRaceId') || Object.keys(State.get('races') || {})[0];
  if (activeRaceId) loadRaceIntoUI();
}

setup();
</script>
</body>
</html>
