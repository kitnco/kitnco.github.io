<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plan Library</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  :root{
    --bg:#1A1C20;
    --panel:#222529;
    --line:#3A3E45;
    --ink:#F4F5F7;
    --sub:#ABB1BA;
    --accent:#5EE6A8;
    --accent-ink:#0B1410;
    --danger:#E0796B;
    --row-hover:#272B30;
  }
  body.light{
    --bg:#F6F5F2;
    --panel:#FFFFFF;
    --line:#DEDBD3;
    --ink:#1C1C1A;
    --sub:#6B6E73;
    --accent:#1F8F5E;
    --accent-ink:#FFFFFF;
    --danger:#C2483A;
    --row-hover:#F4F2EC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,'SF Pro Text',Helvetica,Arial,sans-serif;
    transition:background .2s, color .2s;
  }

  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:18px 28px;
    display:flex;
    align-items:center;
    gap:18px;
  }
  .brand{margin-right:auto;}
  .brand h1{font-size:18px;margin:0;font-weight:700;}
  .brand .sub{font-size:13px;color:var(--sub);margin-top:3px;}

  .pagenav{display:flex;gap:4px;}
  .pagenav a{
    font-size:13px;font-weight:700;text-decoration:none;color:var(--sub);
    padding:7px 12px;border-radius:8px;
  }
  .pagenav a:hover{color:var(--ink);background:var(--row-hover);}
  .pagenav a.active{color:var(--accent-ink);background:var(--accent);}

  .search{
    font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px 12px;width:220px;
  }
  select{
    font-family:inherit;font-size:13px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  }

  .btn{
    border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-text{background:transparent;color:var(--sub);border:none;padding:6px 10px;}
  .btn-text:hover{color:var(--ink);}
  .btn-danger-text{background:transparent;color:var(--danger);border:none;padding:6px 10px;}

  .switch{
    position:relative;width:42px;height:23px;background:var(--bg);border:1px solid var(--line);
    border-radius:12px;cursor:pointer;flex-shrink:0;
  }
  .switch .knob{
    position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;
    background:var(--sub);transition:left .15s, background .15s;
  }
  .switch.on{background:#1F3A30;border-color:var(--accent);}
  .switch.on .knob{left:21px;background:var(--accent);}
  body.light .switch.on{background:#D5F0E2;}

  .main{max-width:880px;margin:0 auto;padding:30px 28px 90px;}

  .group{margin-bottom:34px;}
  .group-head{
    display:flex;align-items:baseline;gap:10px;
    margin-bottom:6px;padding-bottom:8px;border-bottom:1px solid var(--line);
  }
  .group-head.draggable{cursor:grab;}
  .group-head.draggable:active{cursor:grabbing;}
  .group-head.dragging{opacity:.4;}
  .group-head.drag-over{border-bottom-color:var(--accent);}
  .group-head .grip{
    color:var(--sub);font-size:13px;letter-spacing:-1px;user-select:none;flex-shrink:0;
  }
  .group-head h2{
    font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);
    margin:0;font-weight:800;
  }
  .group-head .count{font-size:11px;color:var(--sub);}

  .row{
    display:flex;align-items:center;gap:16px;
    padding:14px 10px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .row:hover{background:var(--row-hover);}
  .row:last-child{border-bottom:none;}
  .row.expanded{background:var(--row-hover);}
  .row .chevron{
    width:14px;flex-shrink:0;color:var(--sub);font-size:11px;
    transition:transform .15s;
  }
  .row.expanded .chevron{transform:rotate(90deg);}

  .detail{
    padding:18px 18px 22px 40px;
    border-bottom:1px solid var(--line);
    background:var(--row-hover);
  }
  .detail-stats{display:flex;gap:28px;margin-bottom:16px;flex-wrap:wrap;}
  .detail-stat .num{font-size:18px;font-weight:800;color:var(--ink);}
  .detail-stat.peak .num{color:var(--accent);}
  .detail-stat .lbl{font-size:10.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-top:2px;}

  .chart-wrap{display:flex;gap:8px;margin-bottom:6px;}
  .chart-svg{width:100%;height:164px;overflow:visible;}
  .chart-svg .gridline{stroke:var(--line);stroke-width:1;}
  .chart-svg .axis-label{font-size:9.5px;fill:var(--sub);font-family:inherit;}
  .chart-svg .x-label{font-size:9.5px;fill:var(--sub);font-family:inherit;text-anchor:middle;}
  .chart-svg .plot-bar{fill:var(--accent);opacity:.9;}
  .chart-svg .plot-bar.taper{fill:var(--sub);}
  .chart-svg .value-label{font-size:9.5px;fill:var(--ink);font-weight:700;text-anchor:middle;font-family:inherit;}
  .chart-svg .value-label.inside{fill:var(--accent-ink);}

  .detail-section-label{
    font-size:10.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;font-weight:700;
    margin-bottom:8px;
  }

  .typecounts{display:flex;flex-wrap:wrap;gap:8px;}
  .typecounts .pill{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
  }
  .typecounts .pill .n{color:var(--sub);font-weight:600;margin-left:3px;}

  .badge{
    font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;
    padding:4px 8px;border-radius:20px;flex-shrink:0;width:124px;text-align:center;
    color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .badge.Marathon{background:#1F8F5E;}
  body.light .badge.Marathon{background:#1F8F5E;}
  .badge.HalfMarathon{background:#3E78C4;}
  .badge.TenK{background:#C98A33;}
  .badge.FiveK{background:#9456C4;}
  .badge.FifteenTen{background:#3FA0A0;}
  .badge.Base{background:#7B8087;}
  .badge.MultiDist{background:#B5638C;}
  .badge.Custom{background:#7B8087;}

  .row-info{flex:1;min-width:0;}
  .row-info .name{font-size:14.5px;font-weight:700;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-info .meta{font-size:12.5px;color:var(--sub);margin-top:3px;}

  .row-actions{display:flex;gap:4px;flex-shrink:0;}

  .empty-state{
    border:1.5px dashed var(--line);border-radius:12px;
    padding:26px;text-align:center;color:var(--sub);font-size:13px;
  }
  .empty-state .btn{margin-top:12px;}

  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(20,20,18,.5);align-items:center;justify-content:center;z-index:10;}
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:420px;max-width:92vw;padding:24px;max-height:84vh;overflow-y:auto;
  }
  .modal h3{margin:0 0 16px;font-size:16px;}
  .modal label{display:block;font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin:14px 0 5px;}
  .modal input[type=text]{
    width:100%;font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  }
  .dropzone{
    border:1.5px dashed var(--line);border-radius:10px;padding:28px 16px;text-align:center;
    color:var(--sub);font-size:13px;cursor:pointer;
  }
  .dropzone.drag{border-color:var(--accent);color:var(--accent);}
  .dropzone input{display:none;}
  .preview{
    margin-top:16px;padding:14px;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    font-size:12.5px;color:var(--sub);display:none;
  }
  .preview.show{display:block;}
  .preview .pname{color:var(--ink);font-weight:700;font-size:14px;margin-bottom:4px;}
  .preview-error{color:var(--danger);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:30px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .2s, transform .2s;
    pointer-events:none;z-index:20;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body class="light">

<div class="topbar">
  <div class="brand">
    <h1>Plan Library</h1>
    <div class="sub">Choose a template, or upload your own</div>
  </div>

  <nav class="pagenav">
    <a href="index.html" class="active">Library</a>
    <a href="calendar.html">Calendar</a>
  </nav>

  <input class="search" id="search" type="text" placeholder="Search plans…">
  <select id="filterType">
    <option value="">All distances</option>
    <option value="Marathon">Marathon</option>
    <option value="HalfMarathon">Half Marathon</option>
    <option value="TenK">10K</option>
    <option value="FiveK">5K</option>
    <option value="FifteenTen">15K / 10 Mile</option>
    <option value="MultiDist">Multiple Distances</option>
    <option value="Base">Base Building</option>
    <option value="Custom">Custom</option>
  </select>

  <button class="btn btn-primary" id="uploadBtn">Upload Plan</button>

  <div class="switch" id="modeToggle"><div class="knob"></div></div>
</div>

<div class="main" id="main"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Upload a plan</h3>

    <div id="uploadSection">
      <div class="dropzone" id="dropzone">
        Drop a .yaml, .yml, or .json plan file here<br>or click to browse
        <input type="file" id="fileInput" accept=".yaml,.yml,.json,text/yaml,application/json">
      </div>
      <div class="preview" id="preview"></div>
    </div>

    <label>Plan name</label>
    <input type="text" id="nameInput" placeholder="e.g. My Modified Pfitzinger Plan">

    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="confirmBtn" disabled>Add to library</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const TYPE_LABELS = {
  Marathon:"Marathon", HalfMarathon:"Half Marathon", TenK:"10K", FiveK:"5K",
  FifteenTen:"15K / 10 Mile", MultiDist:"Multiple Distances", Base:"Base Building", Custom:"Custom"
};
const TYPE_ORDER = ["Long","Tempo","MP","Intervals","Easy","Recovery","Cross","Rest","Race"];

let expandedId = null;
let authorOrder = null; // persists the user's drag-to-reorder of author groups
let draggedAuthor = null;

function badgeClass(type){ return type; }

function rowMeta(plan){
  const parts = [plan.weeks + " weeks"];
  parts.push(plan.timeBased ? "run/walk intervals (time-based)" : "peak " + plan.peakMiles + plan.units + "/wk");
  return parts.join(" · ");
}

function niceMax(v){
  if(v<=0) return 10;
  const mag = Math.pow(10, Math.floor(Math.log10(v)));
  const step = mag/2 || 1;
  return Math.ceil(v/step)*step;
}

function buildBarChartSVG(weekly, taperStart){
  const w = 600, h = 144;
  const padL = 32, padR = 8, padT = 14, padB = 20;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const top = niceMax(Math.max(...weekly, 1));
  const n = weekly.length;

  const slotW = plotW / n;
  const barW = Math.max(2, slotW * 0.6);
  const xFor = i => padL + i*slotW + slotW/2;
  const yFor = v => padT + plotH - (v/top)*plotH;

  const gridFracs = [0, 0.25, 0.5, 0.75, 1];
  let gridlines = "";
  gridFracs.forEach(f=>{
    const y = padT + plotH - f*plotH;
    const val = Math.round(top*f);
    gridlines += `<line class="gridline" x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}"></line>`;
    gridlines += `<text class="axis-label" x="${padL-6}" y="${y+3}" text-anchor="end">${val}</text>`;
  });

  let bars = "", valueLabels = "";
  weekly.forEach((v,i)=>{
    const isTaper = i >= taperStart;
    const cx = xFor(i);
    const barY = yFor(v);
    const barH = (padT + plotH) - barY;
    bars += `<rect class="plot-bar${isTaper?" taper":""}" x="${cx - barW/2}" y="${barY}" width="${barW}" height="${Math.max(barH,1)}" rx="2"></rect>`;
    const labelInside = barH > 16;
    const ly = labelInside ? barY + 11 : barY - 4;
    valueLabels += `<text class="value-label${labelInside?" inside":""}" x="${cx}" y="${ly}">${Math.round(v)}</text>`;
  });

  // x-axis labels: first, last, and a few evenly spaced in between
  const labelCount = Math.min(n, n<=8 ? n : 6);
  const labelStep = Math.max(1, Math.round((n-1)/(labelCount-1)));
  let xLabels = "";
  for(let i=0; i<n; i+=labelStep){
    xLabels += `<text class="x-label" x="${xFor(i)}" y="${h-2}">${i+1}</text>`;
  }
  if((n-1) % labelStep !== 0){
    xLabels += `<text class="x-label" x="${xFor(n-1)}" y="${h-2}">${n}</text>`;
  }

  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${gridlines}
    ${bars}
    ${valueLabels}
    ${xLabels}
  </svg>`;
}

function buildDetailPanel(plan){
  const detail = document.createElement("div"); detail.className="detail";
  const weekly = plan.weeklyMileage || [];

  if(plan.timeBased){
    const stats = document.createElement("div"); stats.className="detail-stats";
    stats.innerHTML = `<div class="detail-stat"><div class="num">${plan.weeks}</div><div class="lbl">Total weeks</div></div>`;
    detail.appendChild(stats);

    const note = document.createElement("div"); note.className="detail-section-label";
    note.style.textTransform = "none"; note.style.fontWeight = "600"; note.style.letterSpacing = "0";
    note.style.fontSize = "12.5px"; note.style.marginBottom = "16px";
    note.textContent = "This plan is prescribed in run/walk time intervals rather than distance, so there's no meaningful weekly mileage to chart.";
    detail.appendChild(note);
  } else {
    const max = Math.max(...weekly, 1);
    const min = Math.min(...weekly);
    const maxWeek = weekly.indexOf(max)+1;
    const minWeek = weekly.indexOf(min)+1;
    const taperStart = Math.max(0, weekly.length - Math.max(2, Math.round(weekly.length*0.15)));

    const stats = document.createElement("div"); stats.className="detail-stats";
    stats.innerHTML = `
      <div class="detail-stat"><div class="num">${plan.weeks}</div><div class="lbl">Total weeks</div></div>
      <div class="detail-stat peak"><div class="num">${max.toFixed(1)} ${plan.units}</div><div class="lbl">Peak week (wk ${maxWeek})</div></div>
      <div class="detail-stat"><div class="num">${min.toFixed(1)} ${plan.units}</div><div class="lbl">Lowest week (wk ${minWeek})</div></div>
    `;
    detail.appendChild(stats);

    const chartLabel = document.createElement("div"); chartLabel.className="detail-section-label";
    chartLabel.textContent = "Mileage by week";
    detail.appendChild(chartLabel);

    const chartWrap = document.createElement("div"); chartWrap.className="chart-wrap";
    chartWrap.innerHTML = buildBarChartSVG(weekly, taperStart);
    detail.appendChild(chartWrap);
  }

  const tcLabel = document.createElement("div"); tcLabel.className="detail-section-label";
  tcLabel.textContent = "Workout mix";
  detail.appendChild(tcLabel);

  const tc = document.createElement("div"); tc.className="typecounts";
  const counts = plan.typeCounts || {};
  TYPE_ORDER.filter(t=>counts[t]).forEach(t=>{
    const pill = document.createElement("span"); pill.className="pill";
    pill.innerHTML = `${t}<span class="n">×${counts[t]}</span>`;
    tc.appendChild(pill);
  });
  detail.appendChild(tc);

  return detail;
}

function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  const q = document.getElementById("search").value.trim().toLowerCase();
  const filterType = document.getElementById("filterType").value;

  const filtered = library.filter(p=>{
    if(filterType && p.type !== filterType) return false;
    if(q && !(p.name.toLowerCase().includes(q) || p.author.toLowerCase().includes(q))) return false;
    return true;
  });

  // group by author, but custom plans always get their own trailing section.
  // authorOrder persists across renders (search/filter/delete) so a manual
  // drag-to-reorder sticks; it's kept in sync with whichever authors
  // currently exist in the full library, alphabetically for any new ones.
  const allAuthors = [...new Set(library.filter(p=>!p.custom).map(p=>p.author))];
  if(!authorOrder){
    authorOrder = [...allAuthors].sort((a,b)=>a.localeCompare(b));
  } else {
    const newOnes = allAuthors.filter(a=>!authorOrder.includes(a)).sort((a,b)=>a.localeCompare(b));
    authorOrder = authorOrder.filter(a=>allAuthors.includes(a)).concat(newOnes);
  }

  const authorsToShow = authorOrder.filter(author=>
    filtered.some(p=>p.author===author && !p.custom)
  );

  authorsToShow.forEach(author=>{
    const plans = filtered.filter(p=>p.author===author && !p.custom);
    if(plans.length===0) return;
    main.appendChild(buildGroup(author, plans));
  });

  // custom section always shown (even if empty), unless a search/filter actively hides it
  const customPlans = filtered.filter(p=>p.custom);
  const showCustomSection = !filterType || filterType==="Custom";
  if(showCustomSection){
    main.appendChild(buildGroup("Your custom plans", customPlans, true));
  }
}

function buildGroup(title, plans, isCustomGroup){
  const group = document.createElement("div"); group.className="group";
  const head = document.createElement("div"); head.className="group-head";

  if(!isCustomGroup){
    head.classList.add("draggable");
    head.draggable = true;
    head.dataset.author = title;
    head.innerHTML = `<span class="grip">⠿</span><h2>${title}</h2><span class="count">${plans.length} plan${plans.length===1?"":"s"}</span>`;

    head.addEventListener("dragstart", e=>{
      draggedAuthor = title;
      head.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", title);
    });
    head.addEventListener("dragend", ()=>head.classList.remove("dragging"));
    head.addEventListener("dragover", e=>{ e.preventDefault(); head.classList.add("drag-over"); });
    head.addEventListener("dragleave", ()=>head.classList.remove("drag-over"));
    head.addEventListener("drop", e=>{
      e.preventDefault();
      head.classList.remove("drag-over");
      if(!draggedAuthor || draggedAuthor === title) return;
      const from = authorOrder.indexOf(draggedAuthor);
      const to = authorOrder.indexOf(title);
      if(from===-1 || to===-1) return;
      authorOrder.splice(from,1);
      authorOrder.splice(to,0,draggedAuthor);
      draggedAuthor = null;
      render();
    });
  } else {
    head.innerHTML = `<h2>${title}</h2><span class="count">${plans.length} plan${plans.length===1?"":"s"}</span>`;
  }

  group.appendChild(head);

  if(plans.length===0 && isCustomGroup){
    const empty = document.createElement("div"); empty.className="empty-state";
    empty.innerHTML = `No custom plans yet. Upload a plan file, or duplicate a template below and save it as your own.`;
    group.appendChild(empty);
    return group;
  }

  plans.forEach(plan=>{
    const row = document.createElement("div"); row.className="row";
    if(plan.id===expandedId) row.classList.add("expanded");

    const chevron = document.createElement("div"); chevron.className="chevron"; chevron.textContent="▶";

    const badge = document.createElement("div");
    badge.className = "badge " + badgeClass(plan.type);
    badge.textContent = TYPE_LABELS[plan.type];

    const info = document.createElement("div"); info.className="row-info";
    info.innerHTML = `<p class="name">${plan.name}</p><div class="meta">${rowMeta(plan)}</div>`;

    const actions = document.createElement("div"); actions.className="row-actions";
    const useBtn = document.createElement("button");
    useBtn.className="btn btn-ghost"; useBtn.textContent="Use plan";
    useBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      showToast(`Opening "${plan.name}" in the calendar…`);
      setTimeout(()=>{ window.location.href = "calendar.html?plan=" + encodeURIComponent(plan.id); }, 500);
    });

    const dupBtn = document.createElement("button");
    dupBtn.className="btn btn-text"; dupBtn.textContent="Duplicate & edit";
    dupBtn.addEventListener("click", (e)=>{ e.stopPropagation(); openDuplicateModal(plan); });

    actions.appendChild(useBtn);
    actions.appendChild(dupBtn);

    const delBtn = document.createElement("button");
    delBtn.className="btn btn-danger-text"; delBtn.textContent="Delete";
    delBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const confirmMsg = plan.custom
        ? `Delete "${plan.name}"? This can't be undone.`
        : `Remove "${plan.name}" from your library? You can always re-add it later by uploading the YAML again.`;
      if(!window.confirm(confirmMsg)) return;
      library = library.filter(p=>p.id!==plan.id);
      if(expandedId===plan.id) expandedId=null;
      render();
      showToast(`"${plan.name}" removed`);
    });
    actions.appendChild(delBtn);

    row.addEventListener("click", ()=>{
      expandedId = expandedId===plan.id ? null : plan.id;
      render();
    });

    row.appendChild(chevron);
    row.appendChild(badge);
    row.appendChild(info);
    row.appendChild(actions);
    group.appendChild(row);

    if(plan.id===expandedId){
      group.appendChild(buildDetailPanel(plan));
    }
  });

  return group;
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove("show"), 2600);
}

// ---- Upload / duplicate modal ----
let pendingPlan = null; // {name, author, type, weeks, peakMiles, units, source}

function openUploadModal(){
  pendingPlan = null;
  document.getElementById("modalTitle").textContent = "Upload a plan";
  document.getElementById("uploadSection").style.display = "block";
  document.getElementById("nameInput").value = "";
  document.getElementById("preview").classList.remove("show");
  document.getElementById("confirmBtn").disabled = true;
  document.getElementById("modalBg").classList.add("open");
}

function openDuplicateModal(plan){
  pendingPlan = {
    name: plan.name + " (My Edit)",
    author: "You",
    type: plan.type,
    weeks: plan.weeks,
    peakMiles: plan.peakMiles,
    units: plan.units,
    source: "Duplicated from " + plan.author,
    weeklyMileage: plan.weeklyMileage,
    typeCounts: plan.typeCounts
  };
  document.getElementById("modalTitle").textContent = "Duplicate & save as new plan";
  document.getElementById("uploadSection").style.display = "none";
  document.getElementById("nameInput").value = pendingPlan.name;
  document.getElementById("confirmBtn").disabled = false;
  document.getElementById("modalBg").classList.add("open");
}

function closeModal(){
  document.getElementById("modalBg").classList.remove("open");
}

function detectType(typeStr){
  const t = (typeStr||"").toLowerCase();
  if(t.includes("half")) return "HalfMarathon";
  if(t.includes("marathon")) return "Marathon";
  if(t.includes("10k")) return "TenK";
  if(t.includes("5k")) return "FiveK";
  return "Custom";
}

function distMax(dist){
  if(dist==null) return 0;
  if(Array.isArray(dist)) return dist[1];
  return dist;
}
function distMid(dist){
  if(dist==null) return 0;
  if(Array.isArray(dist)) return (dist[0]+dist[1])/2;
  return dist;
}
function classifyType(title){
  const t = (title||"").toLowerCase();
  if(t.includes("goal") && t.includes("marathon")) return "Race";
  if(t.includes("tune-up race")) return "Race";
  if(t.includes("rest")) return "Rest";
  if(t.includes("marathon-pace")) return "MP";
  if(t.includes("long run") || t.includes("med-long")) return "Long";
  if(t.includes("recovery")) return "Recovery";
  if(/\blt\b/.test(t)) return "Tempo";
  if(t.includes("vo") && t.includes("max")) return "Intervals";
  if(t.includes("gen-aerobic")) return "Easy";
  return "Easy";
}

function computePeakMiles(schedule){
  let peak = 0;
  (schedule||[]).forEach(week=>{
    const total = (week.workouts||[]).reduce((s,w)=>s+distMax(w.distance),0);
    if(total>peak) peak = total;
  });
  return Math.round(peak);
}

function computeWeeklyAndCounts(schedule){
  const weeklyMileage = [];
  const typeCounts = {};
  (schedule||[]).forEach(week=>{
    let total = 0;
    (week.workouts||[]).forEach(w=>{
      total += distMid(w.distance);
      const t = classifyType(w.title);
      typeCounts[t] = (typeCounts[t]||0) + 1;
    });
    weeklyMileage.push(Math.round(total*10)/10);
  });
  return {weeklyMileage, typeCounts};
}

function parsePlanFile(text, filename){
  let data = null;
  try{
    data = jsyaml.load(text);
  }catch(e){
    try{ data = JSON.parse(text); }catch(e2){ data = null; }
  }
  if(!data || !data.schedule){
    throw new Error("Couldn't find a recognizable plan schedule in this file.");
  }
  const {weeklyMileage, typeCounts} = computeWeeklyAndCounts(data.schedule);
  return {
    name: data.name || filename.replace(/\.(ya?ml|json)$/i,""),
    author: "You",
    type: detectType(data.type),
    weeks: data.schedule.length,
    peakMiles: computePeakMiles(data.schedule),
    units: data.units || "mi",
    source: data.source || "Uploaded file",
    weeklyMileage,
    typeCounts
  };
}

function handleFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    const preview = document.getElementById("preview");
    try{
      pendingPlan = parsePlanFile(reader.result, file.name);
      preview.classList.add("show");
      preview.innerHTML = `<div class="pname">${pendingPlan.name}</div>
        ${TYPE_LABELS[pendingPlan.type]} · ${pendingPlan.weeks} weeks · peak ${pendingPlan.peakMiles}${pendingPlan.units}/wk`;
      document.getElementById("nameInput").value = pendingPlan.name;
      document.getElementById("confirmBtn").disabled = false;
    }catch(err){
      pendingPlan = null;
      preview.classList.add("show");
      preview.innerHTML = `<span class="preview-error">${err.message}</span>`;
      document.getElementById("confirmBtn").disabled = true;
    }
  };
  reader.readAsText(file);
}

function setupModal(){
  document.getElementById("uploadBtn").addEventListener("click", openUploadModal);
  document.getElementById("cancelBtn").addEventListener("click", closeModal);

  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("fileInput");
  dropzone.addEventListener("click", ()=>fileInput.click());
  fileInput.addEventListener("change", e=>{
    if(e.target.files[0]) handleFile(e.target.files[0]);
  });
  dropzone.addEventListener("dragover", e=>{e.preventDefault(); dropzone.classList.add("drag");});
  dropzone.addEventListener("dragleave", ()=>dropzone.classList.remove("drag"));
  dropzone.addEventListener("drop", e=>{
    e.preventDefault(); dropzone.classList.remove("drag");
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  document.getElementById("nameInput").addEventListener("input", e=>{
    if(pendingPlan) pendingPlan.name = e.target.value;
  });

  document.getElementById("confirmBtn").addEventListener("click", ()=>{
    if(!pendingPlan) return;
    const newPlan = Object.assign({}, pendingPlan, {
      id: "custom-" + Date.now(),
      custom: true
    });
    library.push(newPlan);
    closeModal();
    render();
    showToast(`"${newPlan.name}" added to Your custom plans`);
  });

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("filterType").addEventListener("change", render);

  const modeToggle = document.getElementById("modeToggle");
  modeToggle.addEventListener("click", ()=>{
    const isDark = modeToggle.classList.toggle("on");
    document.body.classList.toggle("light", !isDark);
  });
}

setupModal();
render();
</script>
